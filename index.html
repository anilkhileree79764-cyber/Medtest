function pad(n){return String(n).padStart(2,"0")}
function fmtTime(s){

  return h>0?h+":"+pad(m)+":"+pad(sc):pad(m)+":"+pad(sc);

// AUTH
async function handleAuth(){
  var name=ST.authName.trim(),phone=ST.authPhone.replace(/\D/g,""),email=ST.authEmail.trim().toLowerCase(),pass=ST.authPass;
  ss({authErr:"",authLoading:true});
  if(ST.authMode==="register"){
    if(!name){ss({authErr:"Please enter your full name.",authLoading:false});return}
    if(phone.length!==10){ss({authErr:"Please enter a valid 10-digit phone number.",authLoading:false});return}
    if(!email.includes("@")){ss({authErr:"Please enter a valid email address.",authLoading:false});return}
    if(pass.length<6){ss({authErr:"Password must be at least 6 characters.",authLoading:false});return}
    try{
      var res=await sb.signUp(email,pass);
      if(res.error){ss({authErr:res.error.message||"Registration failed.",authLoading:false});return}
      var student={name:name,phone:phone,email:email,joinDate:new Date().toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"})};
      await sb.saveProfile({email:email,name:name,phone:phone,join_date:student.joinDate});
      LS("mt_student",student);
      await loadHistory(email);
      ss({student:student,screen:"home",authLoading:false});
    }catch(e){ss({authErr:"Registration failed. Check internet and try again.",authLoading:false})}
  }else{
    if(!email||!pass){ss({authErr:"Please enter email and password.",authLoading:false});return}
    try{
      var res=await sb.signIn(email,pass);
      if(res.error){ss({authErr:"Invalid email or password.",authLoading:false});return}
      var profile=await sb.getProfile(email);
      var student=profile?{name:profile.name,phone:profile.phone||"",email:profile.email,joinDate:profile.join_date}:{name:email.split("@")[0],phone:"",email:email,joinDate:new Date().toLocaleDateString("en-IN")};
      LS("mt_student",student);
      await loadHistory(email);
      ss({student:student,screen:"home",authLoading:false});
    }catch(e){ss({authErr:"Login failed. Please try again.",authLoading:false})}
  }
}

async function loadHistory(email){
  try{
    var results=await sb.getResults(email);
    if(results&&results.length>0){
      ss({history:results.map(function(r){return Object.assign({},r,{name:r.test_name||"Mock Test",questions:r.questions||[],totalTime:r.total_time||0})})});
    }else{
      ss({history:LS("mt_hist_"+email)||[]});
    }
  }catch(e){ss({history:LS("mt_hist_"+email)||[]})}
}

// TEST
function startTest(qs,minutes,name){
  if(ST.timerInterval)clearInterval(ST.timerInterval);
  ss({testQs:qs,answers:{},marked:{},currentQ:0,qTimings:{},testDone:false,reviewMode:false,timeLeft:minutes*60,qStart:Date.now(),testName:name||"Mock Test",screen:"test",showPalette:false});
  var interval=setInterval(function(){
    if(ST.timeLeft<=1){clearInterval(interval);finalizeTest();return}
    ss({timeLeft:ST.timeLeft-1});
  },1000);
  ss({timerInterval:interval});
}

function goQ(idx){
  var elapsed=Math.round((Date.now()-(ST.qStart||Date.now()))/1000);
  var t=Object.assign({},ST.qTimings);
  t[ST.currentQ]=(t[ST.currentQ]||0)+elapsed;
  ss({qTimings:t,currentQ:idx,qStart:Date.now()});
}

function finalizeTest(){
  if(ST.timerInterval)clearInterval(ST.timerInterval);
  var elapsed=Math.round((Date.now()-(ST.qStart||Date.now()))/1000);
  var t=Object.assign({},ST.qTimings);
  t[ST.currentQ]=(t[ST.currentQ]||0)+elapsed;
  ss({qTimings:t,testDone:true,timerInterval:null});
  saveResult(t);
}

async function saveResult(timings){
  if(!ST.student||!ST.testQs)return;
  var questions=ST.testQs.map(function(q,i){
    return{qId:q.id,subject:q.sub,chapter:q.ch,difficulty:q.dif,answer:ST.answers[i],correct:q.a,isCorrect:ST.answers[i]===q.a,isSkipped:ST.answers[i]===undefined,timeSpent:timings[i]||0};
  });
  var score=questions.reduce(function(s,q){return s+(q.isCorrect?4:q.isSkipped?0:-1)},0);
  var result={id:Date.now(),name:ST.testName,date:new Date().toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"}),questions:questions,score:score,correct:questions.filter(function(q){return q.isCorrect}).length,wrong:questions.filter(function(q){return !q.isCorrect&&!q.isSkipped}).length,skipped:questions.filter(function(q){return q.isSkipped}).length,totalTime:questions.reduce(function(s,q){return s+(q.timeSpent||0)},0)};
  var existing=LS("mt_hist_"+ST.student.email)||[];
  var updated=existing.concat([result]);
  LS("mt_hist_"+ST.student.email,updated);
  ss({history:updated});
  try{await sb.saveResult({student_email:ST.student.email,test_name:result.name,score:result.score,correct:result.correct,wrong:result.wrong,skipped:result.skipped,total_time:result.totalTime,questions:result.questions,date:result.date})}catch(e){}
}

function weakAnalysis(hist){
  var map={};
  hist.forEach(function(t){(t.questions||[]).forEach(function(q){
    var k=q.subject+"|"+q.chapter;
    if(!map[k])map[k]={subject:q.subject,chapter:q.chapter,total:0,wrong:0,correct:0,totalTime:0,count:0};
    map[k].total++;
    if(q.isCorrect)map[k].correct++;
    else if(!q.isSkipped)map[k].wrong++;
    map[k].totalTime+=(q.timeSpent||0);map[k].count++;
  })});
  return Object.values(map).map(function(m){return Object.assign({},m,{accuracy:m.total?Math.round((m.correct/m.total)*100):0,avgTime:m.count?Math.round(m.totalTime/m.count):0})}).sort(function(a,b){return a.accuracy-b.accuracy});
}

function adaptiveTest(){
  var weak=weakAnalysis(ST.history).filter(function(w){return w.accuracy<70});
  if(!weak.length){alert("No weak topics! Keep practicing!");return}
  var chapters=weak.map(function(w){return w.chapter});
  var filtered=QS.filter(function(q){return chapters.indexOf(q.ch)>=0});
  startTest(filtered.length?filtered:QS.slice(0,8),filtered.length?filtered.length*2:20,"Adaptive Test");
}

async function askDoubt(){

  setTimeout(function(){var e=g("chat-end");if(e)e.scrollIntoView({behavior:"smooth"})},100);

    var res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:"You are MedTest AI - expert NEET tutor. Answer Physics, Chemistry, Biology doubts under 150 words. Give chapter name and a memory tip.",messages:[{role:"user",content:q}]})});
    var data=await res.json();
    var text=(data.content||[]).map(function(c){return c.text||""}).join("")||"Sorry, try again.";
    ss({doubts:ST.doubts.concat([{role:"ai",text:text}]),aiLoad:false});
  }catch(e){ss({doubts:ST.doubts.concat([{role:"ai",text:"Connection error. Please try again."}]),aiLoad:false})}
  setTimeout(function(){var e=g("chat-end");if(e)e.scrollIntoView({behavior:"smooth"})},100);
}

async function convertQ(){
  if(!ST.pastedQ.trim())return;
  ss({genLoad:true});
  try{
    var res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2000,system:'Convert to JSON array only (no markdown): [{"sub":"Biology","ch":"Cell Biology","dif":"Medium","en":{"q":"...","o":["A","B","C","D"]},"hi":{"q":"...Hindi","o":["A","B","C","D"]},"a":0,"exp":"..."}] a is 0-indexed. Translate to Hindi. Return ONLY JSON array.',messages:[{role:"user",content:"Convert:\n\n"+ST.pastedQ}]})});
    var data=await res.json();
    var raw=(data.content||[]).map(function(c){return c.text||""}).join("")||"[]";
    var parsed=JSON.parse(raw.replace(/```json|```/g,"").trim());
    ss({genTest:parsed,genLoad:false});
  }catch(e){alert("Parse error. Check format and try again.");ss({genLoad:false})}
}

    html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:7px">';
    var rPD=ST.reviewIdx===0,rND=ST.reviewIdx===ST.testQs.length-1;
    html+='<button onclick="if(ST.reviewIdx>0)ss({reviewIdx:ST.reviewIdx-1})" '+(rPD?"disabled":"")+' style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:9px;padding:10px;color:'+(rPD?"#374151":"#e2e8f0")+';cursor:'+(rPD?"default":"pointer")+';font-size:12px;font-family:Georgia,serif">&#x25C4; Prev</button>';

    var slow=[].concat(timings).sort(function(a,b){return(b.timeSpent||0)-(a.timeSpent||0)}).slice(0,3);

      html+='<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.05)"><span style="font-size:11px;color:#94a3b8">'+t.chapter+' '+(t.isCorrect?"&#x2713;":t.isSkipped?"-":"&#x2717;")+'</span><span style="font-size:11px;font-weight:600;color:'+((t.timeSpent||0)>60?"#ef4444":(t.timeSpent||0)>30?"#f59e0b":"#94a3b8")+'">'+fmtSec(t.timeSpent||0)+'</span></div>';

  return html+'</div>';

    '<div style="font-size:9px;color:#6ee7b7;letter-spacing:2px;margin-bottom:3px">SCORE</div>'+

  html+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px">';
  [["Correct",t.correct,"#10b981"],["Wrong",t.wrong,"#ef4444"],["Skipped",t.skipped,"#f59e0b"]].forEach(function(s){
    html+='<div style="background:'+s[2]+'11;border:1px solid '+s[2]+'33;border-radius:10px;padding:11px 5px;text-align:center"><div style="font-size:20px;font-weight:700;color:'+s[2]+'">'+s[1]+'</div><div style="font-size:9px;color:#64748b;margin-top:2px">'+s[0]+'</div></div>';
  });
  html+='</div>';
  if(timings.length){
    html+='<div style="background:rgba(59,130,246,0.07);border:1px solid rgba(59,130,246,0.2);border-radius:13px;padding:12px;margin-bottom:12px">'+
      '<div style="font-size:11px;color:#60a5fa;font-weight:600;margin-bottom:10px">&#x23F1; Time Per Question</div>'+
      '<div style="display:flex;align-items:flex-end;gap:2px;height:65px;margin-bottom:6px">';
    timings.forEach(function(q){
      var h=Math.max(2,((q.timeSpent||0)/maxT)*100);
      html+='<div title="'+fmtSec(q.timeSpent||0)+'" style="flex:1;height:'+h+'%;border-radius:2px 2px 0 0;background:'+(q.isCorrect?"#10b981":q.isSkipped?"#374151":"#ef4444")+';opacity:0.8;min-height:2px"></div>';
    });
    html+='</div>';
    html+='<div style="font-size:10px;color:#94a3b8;margin-bottom:6px">SLOWEST QUESTIONS</div>';
    [].concat(timings).sort(function(a,b){return(b.timeSpent||0)-(a.timeSpent||0)}).slice(0,4).forEach(function(q){
      html+='<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.05)"><div><span style="font-size:11px;color:#cbd5e1">'+q.chapter+'</span><span style="font-size:9px;color:'+(q.isCorrect?"#10b981":q.isSkipped?"#64748b":"#ef4444")+';margin-left:6px">'+(q.isCorrect?"&#x2713;":q.isSkipped?"&ndash;":"&#x2717;")+'</span></div><span style="font-size:11px;font-weight:600;color:'+((q.timeSpent||0)>90?"#ef4444":(q.timeSpent||0)>45?"#f59e0b":"#94a3b8")+'">'+fmtSec(q.timeSpent||0)+'</span></div>';
    });
    html+='</div>';
  }
  html+='<div style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:13px;padding:12px">'+
    '<div style="font-size:11px;color:#64748b;font-weight:600;margin-bottom:10px">SUBJECT BREAKDOWN</div>';
  ["Biology","Physics","Chemistry"].forEach(function(subj){
    var qs=timings.filter(function(q){return q.subject===subj});
    var c=qs.filter(function(q){return q.isCorrect}).length;
    var acc=qs.length?Math.round((c/qs.length)*100):0;
    var avgT=qs.length?Math.round(qs.reduce(function(s,q){return s+(q.timeSpent||0)},0)/qs.length):0;
    html+='<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:12px;color:'+(SC[subj]||"#94a3b8")+'">'+subj+'</span><div style="display:flex;gap:10px;font-size:11px"><span style="color:'+(SC[subj]||"#94a3b8")+';font-weight:600">'+acc+'%</span><span style="color:#64748b">&#x23F1; avg '+fmtSec(avgT)+'</span></div></div>'+
      '<div style="height:5px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden"><div style="height:100%;width:'+acc+'%;background:'+(SC[subj]||"#94a3b8")+';border-radius:3px"></div></div></div>';
  });
  return html+'</div></div>';
}

  html+='</div>';
  if(ST.adminTab==="upload"){
    html+='<div style="background:rgba(255,193,7,0.07);border:1px solid rgba(255,193,7,0.18);border-radius:11px;padding:11px 13px;margin-bottom:14px">'+
      '<div style="font-size:11px;color:#fbbf24;font-weight:600;margin-bottom:3px">&#x1F512; Private Zone</div>'+
      '<div style="font-size:10px;color:#92400e;line-height:1.6">Paste NCERT or coaching questions. AI converts and translates to Hindi. Students only see final tests.</div></div>';
    html+='<textarea id="pq" placeholder="1. Which organelle produces ATP?\na) Nucleus  b) Mitochondria\nc) Ribosome  d) Golgi\nAnswer: b" oninput="SS({pastedQ:this.value})" style="width:100%;min-height:160px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09);border-radius:11px;padding:11px 12px;color:#e2e8f0;font-size:11px;outline:none;font-family:monospace;resize:vertical;line-height:1.6;box-sizing:border-box">'+ST.pastedQ+'</textarea>';
    var canConvert=ST.pastedQ&&ST.pastedQ.trim().length>0;
    html+=btn(ST.genLoad?"&#x23F3; Processing...":"&#x26A1; Convert to Test","convertQ()",canConvert?"linear-gradient(135deg,#10b981,#059669)":"rgba(255,255,255,0.05)","#fff","margin-top:9px");
    if(ST.genTest&&ST.genTest.length){
      html+='<div style="margin-top:14px"><div style="font-size:11px;color:#10b981;font-weight:600;margin-bottom:9px">&#x2705; '+ST.genTest.length+' Questions Ready!</div>';
      ST.genTest.slice(0,3).forEach(function(q){
        var subj=q.sub||q.subject||"?";
        var ch=q.ch||q.chapter||"?";
        var dif=q.dif||q.difficulty||"Medium";
        var qtext=(q.en&&q.en.q)||q.q||"";
        var opts=(q.en&&q.en.o)||q.o||q.opts||[];
        var ans=q.a!==undefined?q.a:(q.ans!==undefined?q.ans:(q.answer!==undefined?q.answer:0));
        html+='<div style="background:rgba(16,185,129,0.06);border:1px solid rgba(16,185,129,0.14);border-radius:10px;padding:11px 12px;margin-bottom:7px">'+
          '<div style="display:flex;gap:6px;margin-bottom:5px">'+tag(subj,SC[subj]||"#94a3b8")+tag(dif,"#94a3b8")+'</div>'+
          '<div style="font-size:11px;color:#cbd5e1;margin-bottom:5px">'+qtext+'</div>';
        opts.forEach(function(o,oi){
          html+='<div style="font-size:10px;color:'+(oi===ans?"#10b981":"#64748b")+';padding:1px 0">'+["A","B","C","D"][oi]+". "+o+(oi===ans?" &#x2713;":"")+'</div>';
        });
        html+='</div>';
      });
      if(ST.genTest.length>3)html+='<div style="font-size:11px;color:#64748b;margin-bottom:9px">...and '+(ST.genTest.length-3)+' more questions</div>';
      html+=btn("&#x1F680; Launch This Test","startTest(ST.genTest,ST.genTest.length*2,'Custom Test')","linear-gradient(135deg,#3b82f6,#1d4ed8)","#fff","margin-top:4px");
      html+='</div>';
    }
  }else{
    html+='<div style="background:rgba(139,92,246,0.08);border:1px solid rgba(139,92,246,0.18);border-radius:11px;padding:12px 13px;margin-bottom:14px">'+
      '<div style="font-size:12px;color:#a78bfa;font-weight:600;margin-bottom:4px">&#x26A1; AI Test Generator</div>'+
      '<div style="font-size:10px;color:#7c3aed;line-height:1.6">Select a topic. AI generates the test. You review it. Then launch to students.</div></div>';
    [["Cell Biology and Genetics","Biology",10],["Laws of Motion and Thermodynamics","Physics",10],["Chemical Bonding and Organic","Chemistry",10],["Full Mixed NEET","All",20]].forEach(function(t){
      var prompt="Generate "+t[2]+" NEET MCQs on "+t[0]+" ("+t[1]+"). Strictly NCERT based. Include answer and explanation.";
      html+='<button onclick="ss({pastedQ:\''+prompt+'\',adminTab:\'upload\'})" style="background:rgba(255,255,255,0.04);border:1px solid rgba(139,92,246,0.18);border-radius:10px;padding:12px 13px;color:#fff;cursor:pointer;display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;text-align:left;width:100%">'+
        '<div><div style="font-size:12px;font-weight:600">'+t[0]+'</div><div style="font-size:9px;color:#64748b;margin-top:1px">'+t[1]+' &bull; '+t[2]+' Qs</div></div>'+
        '<div style="background:rgba(139,92,246,0.18);color:#a78bfa;border-radius:6px;padding:4px 9px;font-size:9px;font-weight:600">Select</div></button>';
    });
  }
  return html+'</div>';
}
