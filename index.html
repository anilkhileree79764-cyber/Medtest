const sb = {
  async signUp(email, password) {
    const r = await fetch(`${SUPABASE_URL}/auth/v1/signup`, { method:"POST", headers:H, body:JSON.stringify({email,password}) });
    return await r.json();
  },
  async signIn(email, password) {
    const r = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, { method:"POST", headers:H, body:JSON.stringify({email,password}) });
    return await r.json();
  },
  async saveProfile(profile) {
    try {
      await fetch(`${SUPABASE_URL}/rest/v1/profiles`, { method:"POST", headers:{...H,"Prefer":"resolution=merge-duplicates"}, body:JSON.stringify(profile) });
    } catch {}
  },
  async getProfile(email) {
    try {
      const r = await fetch(`${SUPABASE_URL}/rest/v1/profiles?email=eq.${encodeURIComponent(email)}&limit=1`, { headers:H });
      const d = await r.json(); return d[0]||null;
    } catch { return null; }
  },
  async saveResult(result) {
    try {
      await fetch(`${SUPABASE_URL}/rest/v1/test_results`, { method:"POST", headers:H, body:JSON.stringify(result) });
    } catch {}
  },
  async getResults(email) {
    try {
      const r = await fetch(`${SUPABASE_URL}/rest/v1/test_results?student_email=eq.${encodeURIComponent(email)}&order=created_at.asc`, { headers:H });
      return await r.json();
    } catch { return []; }
  }
};

const fmtTime = s => {
  if(s===undefined||s===null) return "–";
  const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=s%60;
  if(h>0) return `${h}:${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;
  return `${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;
};
const fmtSec = s => s<60?`${s}s`:`${Math.floor(s/60)}m ${s%60}s`;

// ─────────────────────────────────────────────────────────────────────────────
export default function MedTest() {
  const [student, setStudent] = useState(null);
  const [authMode, setAuthMode] = useState("login");
  const [authForm, setAuthForm] = useState({name:"",phone:"",email:"",password:""});
  const [authErr, setAuthErr] = useState("");
  const [authLoading, setAuthLoading] = useState(false);
  const [screen, setScreen] = useState("home");
  const [lang, setLang] = useState("en");
  const [menuOpen, setMenuOpen] = useState(false);
  // test
  const [testQs, setTestQs] = useState(null);
  const [answers, setAnswers] = useState({});
  const [marked, setMarked] = useState({});
  const [currentQ, setCurrentQ] = useState(0);
  const [timeLeft, setTimeLeft] = useState(0);
  const [testDone, setTestDone] = useState(false);
  const [showPalette, setShowPalette] = useState(false);
  const [qTimings, setQTimings] = useState({});       // {qIdx: totalSecondsSpent}
  const [qStart, setQStart] = useState(null);         // when current Q was shown
  const timerRef = useRef(null);
  // results
  const [reviewMode, setReviewMode] = useState(false);
  const [reviewIdx, setReviewIdx] = useState(0);
  // analytics
  const [history, setHistory] = useState([]);
  const [histN, setHistN] = useState(10);
  const [selTest, setSelTest] = useState(null);
  // ai
  const [doubt, setDoubt] = useState("");
  const [doubts, setDoubts] = useState([]);
  const [aiLoad, setAiLoad] = useState(false);
  const [adaptLoad, setAdaptLoad] = useState(false);
  const chatEnd = useRef(null);
  // admin
  const [adminTab, setAdminTab] = useState("upload");
  const [pastedQ, setPastedQ] = useState("");
  const [genTest, setGenTest] = useState(null);
  const [genLoad, setGenLoad] = useState(false);

  // Load student + history from storage on mount
  useEffect(()=>{
    (async()=>{
      const s = await store.get("medtest:currentStudent");
      if(s){ setStudent(s); loadHistory(s.email); }
    })();
  },[]);

  useEffect(()=>{ if(chatEnd.current) chatEnd.current.scrollIntoView({behavior:"smooth"}); },[doubts]);

  const loadHistory = async (email) => {
    try {
      const results = await sb.getResults(email);
      if(results && results.length > 0) {
        setHistory(results.map(r => ({
          ...r, id:r.id, name:r.test_name||"Mock Test",
          questions:r.questions||[], totalTime:r.total_time||0,
        })));
      } else {
        const h = await store.get(`medtest:history:${email}`) || [];
        setHistory(h);
      }
    } catch {
      const h = await store.get(`medtest:history:${email}`) || [];
      setHistory(h);
    }
  };

  // ── AUTH ──────────────────────────────────────────────────────────────────
  const handleAuth = async () => {
    setAuthErr(""); setAuthLoading(true);
    if(authMode==="register"){
      if(!authForm.name.trim()){ setAuthErr("Please enter your full name."); setAuthLoading(false); return; }
      if(!authForm.phone.trim()||authForm.phone.replace(/\D/g,"").length!==10){ setAuthErr("Please enter a valid 10-digit phone number."); setAuthLoading(false); return; }
      if(!authForm.email.trim()||!authForm.email.includes("@")){ setAuthErr("Please enter a valid email address."); setAuthLoading(false); return; }
      if(!authForm.password||authForm.password.length<6){ setAuthErr("Password must be at least 6 characters."); setAuthLoading(false); return; }
      try {
        const res = await sb.signUp(authForm.email.trim(), authForm.password);
        if(res.error){ setAuthErr(res.error.message||"Registration failed."); setAuthLoading(false); return; }
        const newStudent = {
          name:authForm.name.trim(), phone:authForm.phone.replace(/\D/g,""),
          email:authForm.email.trim().toLowerCase(),
          joinDate:new Date().toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"}),
          emailVerified:false,
        };
        await sb.saveProfile({ email:newStudent.email, name:newStudent.name, phone:newStudent.phone, join_date:newStudent.joinDate });
        await store.set("medtest:currentStudent", newStudent);
        setStudent(newStudent); loadHistory(newStudent.email);
      } catch(e){ setAuthErr("Registration failed. Please check your internet and try again."); }
    } else {
      if(!authForm.email||!authForm.password){ setAuthErr("Please enter email and password."); setAuthLoading(false); return; }
      try {
        const res = await sb.signIn(authForm.email.trim(), authForm.password);
        if(res.error){ setAuthErr("Invalid email or password."); setAuthLoading(false); return; }
        const profile = await sb.getProfile(authForm.email.trim().toLowerCase());
        const s = profile ? {
          name:profile.name, phone:profile.phone||"", email:profile.email,
          joinDate:profile.join_date, emailVerified:true,
        } : {
          name:authForm.email.split("@")[0], phone:"",
          email:authForm.email.trim().toLowerCase(),
          joinDate:new Date().toLocaleDateString("en-IN"), emailVerified:true,
        };
        await store.set("medtest:currentStudent", s);
        setStudent(s); loadHistory(s.email);
      } catch(e){ setAuthErr("Login failed. Please try again."); }
    }
    setAuthLoading(false);
  };

  const logout = async () => {
    await store.set("medtest:currentStudent", null);
    setStudent(null); setHistory([]); setScreen("home");
  };

  // ── TEST ENGINE ───────────────────────────────────────────────────────────
  const startTest = (qs, minutes, testName="Mock Test") => {
    setAnswers({}); setMarked({}); setCurrentQ(0); setQTimings({});
    setTestDone(false); setReviewMode(false); setTestQs(qs);
    setTimeLeft(minutes*60); setQStart(Date.now()); setScreen("test");
    setShowPalette(false);
    // store test name for later
    window._testName = testName;
  };

  // Count time for current question when navigating
  const goToQ = useCallback((idx) => {
    const elapsed = Math.round((Date.now() - (qStart||Date.now()))/1000);
    setQTimings(t=>({ ...t, [currentQ]: (t[currentQ]||0) + elapsed }));
    setCurrentQ(idx);
    setQStart(Date.now());
  }, [currentQ, qStart]);

  useEffect(()=>{
    if(testQs&&!testDone){
      timerRef.current = setInterval(()=>{
        setTimeLeft(t=>{
          if(t<=1){ clearInterval(timerRef.current); finalizeTest(); return 0; }
          return t-1;
        });
      },1000);
    }
    return ()=>clearInterval(timerRef.current);
  },[testQs,testDone]);

  const finalizeTest = () => {
    // record last question's time
    const elapsed = Math.round((Date.now()-(qStart||Date.now()))/1000);
    setQTimings(t=>{ const n={...t,[currentQ]:(t[currentQ]||0)+elapsed}; saveResult(n); return n; });
    setTestDone(true);
  };

  const submitTest = () => { clearInterval(timerRef.current); finalizeTest(); };

  const saveResult = async (timings) => {
    if(!student) return;
    const result = {
      id: Date.now(),
      name: window._testName || "Mock Test",
      date: new Date().toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"}),
      timestamp: Date.now(),
      questions: (testQs||[]).map((q,i)=>({
        qId:q.id, subject:q.subject, chapter:q.chapter, difficulty:q.difficulty,
        answer:answers[i], correct:q.answer, isCorrect:answers[i]===q.answer,
        isSkipped:answers[i]===undefined, timeSpent:timings[i]||0,
      })),
    };
    result.score = result.questions.reduce((s,q)=>s+(q.isCorrect?4:q.isSkipped?0:-1),0);
    result.correct = result.questions.filter(q=>q.isCorrect).length;
    result.wrong = result.questions.filter(q=>!q.isCorrect&&!q.isSkipped).length;

    result.totalTime = result.questions.reduce((s,q)=>s+q.timeSpent,0);

    const updated = [...existing, result];
    await store.set(`medtest:history:${student.email}`, updated);
    // Also save to Supabase permanently
    await sb.saveResult({
      student_email: student.email, test_name: result.name,
      score: result.score, correct: result.correct,
      wrong: result.wrong, skipped: result.skipped,

    });
    setHistory(updated);
  };

    let c=0,w=0;
    (testQs||[]).forEach((q,i)=>{ if(answers[i]===undefined)return; answers[i]===q.answer?c++:w++; });
    return {correct:c, wrong:w, skipped:(testQs?.length||0)-c-w, total:c*4-w};
  };

  // ── WEAK TOPIC ANALYSIS ───────────────────────────────────────────────────
  const getWeakAnalysis = (hist) => {
    // aggregate by chapter
    const map = {};
    hist.forEach(test=>{
      test.questions.forEach(q=>{
        const key = `${q.subject}|${q.chapter}`;
        if(!map[key]) map[key]={subject:q.subject,chapter:q.chapter,total:0,wrong:0,correct:0,totalTime:0,count:0};
        map[key].total++;
        if(q.isCorrect) map[key].correct++;
        else if(!q.isSkipped) map[key].wrong++;
        map[key].totalTime+=q.timeSpent;
        map[key].count++;
      });
    });
    return Object.values(map).map(m=>({
      ...m,
      accuracy:m.total>0?Math.round((m.correct/m.total)*100):0,
      avgTime:m.count>0?Math.round(m.totalTime/m.count):0,
    })).sort((a,b)=>a.accuracy-b.accuracy);
  };

  const getTimeAnalysis = (hist) => {
    const map = {};
    hist.forEach(test=>{
      test.questions.forEach(q=>{
        const key=`${q.subject}|${q.chapter}`;
        if(!map[key]) map[key]={subject:q.subject,chapter:q.chapter,totalTime:0,count:0};
        map[key].totalTime+=q.timeSpent; map[key].count++;
      });
    });
    return Object.values(map).map(m=>({...m,avgTime:Math.round(m.totalTime/m.count)})).sort((a,b)=>b.avgTime-a.avgTime);

answer is 0-indexed. Translate to Hindi. NCERT-based. Return ONLY the JSON array.`,

                <div style={{fontSize:26}}>{t.emoji}</div>
                <div><div style={{fontSize:14,fontWeight:600}}>{t.title}</div><div style={{fontSize:10,color:"#64748b",marginTop:2}}>{t.desc}</div></div>
                <div style={{marginLeft:"auto",background:t.c+"22",color:t.c,borderRadius:7,padding:"5px 11px",fontSize:10,fontWeight:600}}>Start</div>
              </button>
            ))}
            {weakTopics.filter(w=>w.accuracy<70).length>0&&(
              <button onClick={generateAdaptiveTest} style={{width:"100%",background:"rgba(245,158,11,0.12)",border:"1px solid rgba(245,158,11,0.3)",borderRadius:13,padding:"15px 14px",color:"#fff",cursor:"pointer",display:"flex",alignItems:"center",gap:12,textAlign:"left"}}>
                <div style={{fontSize:26}}>🎯</div>
                <div><div style={{fontSize:14,fontWeight:600}}>Adaptive Test</div><div style={{fontSize:10,color:"#64748b",marginTop:2}}>AI-generated from your weak topics</div></div>
                <div style={{marginLeft:"auto",background:"rgba(245,158,11,0.22)",color:"#f59e0b",borderRadius:7,padding:"5px 11px",fontSize:10,fontWeight:600}}>Smart</div>
              </button>
            )}
          </div>
        )}

        {/* ══════════ TEST TAKING ══════════ */}
        {screen==="test"&&testQs&&!testDone&&(()=>{
          const q=testQs[currentQ], total=testQs.length, attempted=Object.keys(answers).length;
          const qSt = (i) => marked[i]?"review":answers[i]!==undefined?"answered":"none";
          return (
            <div style={{padding:"8px 12px"}}>
              {/* Timer row */}
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"rgba(255,255,255,0.05)",borderRadius:11,padding:"8px 12px",marginBottom:10}}>
                <div style={{display:"flex",alignItems:"center",gap:6,fontWeight:700,fontSize:18,fontVariantNumeric:"tabular-nums",color:timeLeft<600?"#ef4444":timeLeft<1800?"#f59e0b":"#10b981"}}>
                  <Icon name="clock" size={15}/>{fmtTime(timeLeft)}
                </div>
                <div style={{display:"flex",gap:8,fontSize:10,color:"#64748b"}}>
                  <span style={{color:"#10b981"}}>✓{attempted}</span>
                  <span style={{color:"#f59e0b"}}>🚩{Object.keys(marked).length}</span>
                  <span>/{total}</span>
                </div>
                <button onClick={submitTest} style={{background:"#10b981",border:"none",borderRadius:7,padding:"6px 13px",color:"#fff",fontSize:11,cursor:"pointer",fontWeight:600}}>Submit</button>
              </div>
              {/* Progress */}
              <div style={{height:3,background:"rgba(255,255,255,0.06)",borderRadius:3,marginBottom:11,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${(attempted/total)*100}%`,background:"linear-gradient(90deg,#10b981,#3b82f6)",borderRadius:3,transition:"width 0.3s"}}/>
              </div>
              {/* Palette toggle */}
              <button onClick={()=>setShowPalette(p=>!p)} style={{width:"100%",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.09)",borderRadius:9,padding:"7px 12px",color:"#94a3b8",fontSize:10,cursor:"pointer",marginBottom:10,display:"flex",justifyContent:"space-between"}}>
                <span>📊 Q{currentQ+1}/{total} — tap to see all questions</span><span>{showPalette?"▲":"▼"}</span>
              </button>
              {/* Palette */}
              {showPalette&&(
                <div style={{background:"rgba(0,0,0,0.45)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:11,padding:10,marginBottom:10}}>
                  <div style={{display:"flex",gap:10,flexWrap:"wrap",fontSize:9,color:"#64748b",marginBottom:8}}>
                    <span><span style={{display:"inline-block",width:8,height:8,borderRadius:2,background:"#10b981",marginRight:3}}/>Answered</span>
                    <span><span style={{display:"inline-block",width:8,height:8,borderRadius:2,background:"#f59e0b",marginRight:3}}/>Marked</span>
                    <span><span style={{display:"inline-block",width:8,height:8,borderRadius:2,background:"rgba(255,255,255,0.1)",marginRight:3}}/>Not done</span>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(8,1fr)",gap:4}}>
                    {testQs.map((_,i)=>{
                      const st=qSt(i);
                      return <button key={i} onClick={()=>{goToQ(i);setShowPalette(false);}} style={{height:28,borderRadius:5,background:st==="answered"?"#10b981":st==="review"?"#f59e0b":"rgba(255,255,255,0.07)",border:i===currentQ?"2px solid #fff":"1px solid transparent",color:"#fff",fontSize:9,fontWeight:600,cursor:"pointer"}}>{i+1}</button>;
                    })}
                  </div>
                </div>
              )}
              {/* Question Card */}
              <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:14,padding:14,marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:9}}>
                  <div style={{display:"flex",gap:6}}>
                    <span style={{fontSize:9,background:SUBJ_COLOR[q.subject]+"22",color:SUBJ_COLOR[q.subject],padding:"2px 7px",borderRadius:10}}>{q.subject}</span>
                    <span style={{fontSize:9,background:"rgba(255,255,255,0.06)",color:"#94a3b8",padding:"2px 7px",borderRadius:10}}>{q.chapter}</span>
                  </div>
                  <span style={{fontSize:10,color:"#475569"}}>{q.difficulty}</span>
                </div>
                <p style={{fontSize:13,lineHeight:1.65,color:"#e2e8f0",marginBottom:13}}>{q[lang].q}</p>
                {q[lang].options.map((opt,oi)=>(
                  <button key={oi} onClick={()=>setAnswers(a=>({...a,[currentQ]:oi}))} style={{width:"100%",background:answers[currentQ]===oi?"rgba(16,185,129,0.18)":"rgba(255,255,255,0.04)",border:`1px solid ${answers[currentQ]===oi?"#10b981":"rgba(255,255,255,0.09)"}`,borderRadius:9,padding:"10px 12px",color:answers[currentQ]===oi?"#10b981":"#cbd5e1",cursor:"pointer",fontSize:12,textAlign:"left",display:"flex",alignItems:"center",gap:9,marginBottom:6,transition:"all 0.15s"}}>
                    <span style={{width:20,height:20,borderRadius:"50%",background:answers[currentQ]===oi?"#10b981":"rgba(255,255,255,0.08)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,flexShrink:0}}>{["A","B","C","D"][oi]}</span>
                    {opt}
                  </button>
                ))}
              </div>
              {/* Nav buttons */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7}}>
                <button onClick={()=>goToQ(Math.max(0,currentQ-1))} disabled={currentQ===0} style={{background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:9,padding:"10px 6px",color:currentQ===0?"#374151":"#e2e8f0",cursor:currentQ===0?"default":"pointer",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>
                  <Icon name="chevL" size={13}/>Prev
                </button>
                <button onClick={()=>setMarked(m=>({...m,[currentQ]:!m[currentQ]}))} style={{background:marked[currentQ]?"rgba(245,158,11,0.18)":"rgba(255,255,255,0.05)",border:`1px solid ${marked[currentQ]?"#f59e0b":"rgba(255,255,255,0.09)"}`,borderRadius:9,padding:"10px 6px",color:marked[currentQ]?"#f59e0b":"#94a3b8",cursor:"pointer",fontSize:11,display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>
                  <Icon name="flag" size={12}/>{marked[currentQ]?"Marked":"Mark"}
                </button>
                <button onClick={()=>goToQ(Math.min(total-1,currentQ+1))} disabled={currentQ===total-1} style={{background:currentQ===total-1?"rgba(255,255,255,0.03)":"rgba(16,185,129,0.13)",border:`1px solid ${currentQ===total-1?"rgba(255,255,255,0.08)":"rgba(16,185,129,0.35)"}`,borderRadius:9,padding:"10px 6px",color:currentQ===total-1?"#374151":"#10b981",cursor:currentQ===total-1?"default":"pointer",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>
                  Next<Icon name="chevR" size={13}/>
                </button>
              </div>
              {answers[currentQ]!==undefined&&(
                <button onClick={()=>setAnswers(a=>{const n={...a};delete n[currentQ];return n;})} style={{width:"100%",background:"rgba(239,68,68,0.07)",border:"1px solid rgba(239,68,68,0.18)",borderRadius:9,padding:"7px",color:"#f87171",fontSize:11,cursor:"pointer",marginTop:7}}>Clear Answer</button>
              )}
            </div>
          );
        })()}

        {/* ══════════ RESULT ══════════ */}
        {screen==="test"&&testDone&&testQs&&(()=>{
          const {correct,wrong,skipped,total}=calcScore();
          const pct=Math.round((Math.max(0,total)/(testQs.length*4))*100);
          const lastResult = history[history.length-1];
          const timings = lastResult?.questions || [];

          return (
            <div style={{padding:"16px 14px"}}>
              {!reviewMode?(
                <>
                  <div style={{textAlign:"center",marginBottom:20}}>
                    <div style={{fontSize:46,marginBottom:5}}>{pct>=60?"🎉":pct>=40?"👍":"💪"}</div>
                    <div style={{fontSize:10,color:"#6ee7b7",letterSpacing:2}}>TEST COMPLETE</div>
                    <div style={{fontSize:42,fontWeight:700,color:"#fff",margin:"4px 0"}}>{Math.max(0,total)}</div>
                    <div style={{fontSize:12,color:"#64748b"}}>out of {testQs.length*4} marks</div>
                  </div>

                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:9,marginBottom:16}}>
                    {[{l:"Correct",v:correct,c:"#10b981"},{l:"Wrong",v:wrong,c:"#ef4444"},{l:"Skipped",v:skipped,c:"#f59e0b"}].map(s=>(
                      <div key={s.l} style={{background:s.c+"12",border:`1px solid ${s.c}33`,borderRadius:11,padding:"12px 6px",textAlign:"center"}}>
                        <div style={{fontSize:22,fontWeight:700,color:s.c}}>{s.v}</div>
                        <div style={{fontSize:9,color:"#64748b",marginTop:2}}>{s.l}</div>
                      </div>
                    ))}
                  </div>

                  {/* TIME BREAKDOWN — new feature */}
                  <div style={{background:"rgba(59,130,246,0.07)",border:"1px solid rgba(59,130,246,0.2)",borderRadius:13,padding:14,marginBottom:12}}>
                    <div style={{fontSize:12,color:"#60a5fa",fontWeight:600,marginBottom:10}}>⏱️ Time Per Question</div>
                    <div style={{display:"flex",alignItems:"flex-end",gap:3,height:70,marginBottom:8}}>
                      {timings.map((q,i)=>{
                        const maxT=Math.max(...timings.map(t=>t.timeSpent),1);
                        const h=Math.max(4,(q.timeSpent/maxT)*100);
                        const color=q.isCorrect?"#10b981":q.isSkipped?"#475569":"#ef4444";
                        return (
                          <div key={i} title={`Q${i+1}: ${fmtSec(q.timeSpent)}`} style={{flex:1,height:`${h}%`,borderRadius:"2px 2px 0 0",background:color,opacity:0.85,cursor:"default",minHeight:3}}/>
                        );
                      })}
                    </div>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"#475569",marginBottom:6}}>
                      <span>Q1</span><span>Q{timings.length}</span>
                    </div>
                    <div style={{display:"flex",gap:10,fontSize:9,color:"#64748b"}}>
                      <span style={{color:"#10b981"}}>■ Correct</span><span style={{color:"#ef4444"}}>■ Wrong</span><span style={{color:"#475569"}}>■ Skipped</span>
                    </div>
                    {/* Top slow questions */}
                    {timings.length>0&&(()=>{
                      const sorted=[...timings].sort((a,b)=>b.timeSpent-a.timeSpent).slice(0,3);
                      return (
                        <div style={{marginTop:10}}>
                          <div style={{fontSize:10,color:"#94a3b8",marginBottom:6}}>SLOWEST QUESTIONS</div>
                          {sorted.map((q,i)=>(
                            <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
                              <span style={{fontSize:11,color:"#94a3b8"}}>{q.chapter} — Q (idx:{timings.indexOf(q)+1})</span>
                              <span style={{fontSize:11,color:q.timeSpent>60?"#ef4444":"#f59e0b",fontWeight:600}}>{fmtSec(q.timeSpent)}</span>
                            </div>
                          ))}
                        </div>
                      );
                    })()}
                  </div>

                  <button onClick={()=>{setReviewMode(true);setReviewIdx(0);}} style={{width:"100%",background:"rgba(59,130,246,0.13)",border:"1px solid rgba(59,130,246,0.25)",borderRadius:11,padding:"12px",color:"#60a5fa",fontSize:13,cursor:"pointer",fontWeight:600,marginBottom:9,display:"flex",alignItems:"center",justifyContent:"center",gap:7}}>
                    <Icon name="eye" size={15}/>Review All Questions
                  </button>
                  <button onClick={()=>nav("analytics")} style={{width:"100%",background:"rgba(16,185,129,0.13)",border:"1px solid rgba(16,185,129,0.25)",borderRadius:11,padding:"12px",color:"#10b981",fontSize:13,cursor:"pointer",fontWeight:600,marginBottom:9,display:"flex",alignItems:"center",justifyContent:"center",gap:7}}>
                    <Icon name="chart" size={15}/>View Full Analysis
                  </button>
                  <button onClick={()=>startTest(QUESTIONS,200,"Full Mock Test")} style={{width:"100%",background:"linear-gradient(135deg,#10b981,#059669)",border:"none",borderRadius:11,padding:"12px",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer"}}>
                    Retake Test
                  </button>
                </>
              ):(()=>{
                const rq=testQs[reviewIdx];
                const ans=answers[reviewIdx];
                const isCorrect=ans===rq.answer, isSkipped=ans===undefined;
                const timing=lastResult?.questions[reviewIdx];
                return (
                  <div>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                      <button onClick={()=>setReviewMode(false)} style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:7,padding:"6px 11px",color:"#94a3b8",fontSize:11,cursor:"pointer"}}>← Results</button>
                      <span style={{fontSize:12,color:"#64748b"}}>Q{reviewIdx+1}/{testQs.length}</span>
                      <span style={{fontSize:11,color:isSkipped?"#f59e0b":isCorrect?"#10b981":"#ef4444",fontWeight:600}}>{isSkipped?"SKIPPED":isCorrect?"✓ CORRECT":"✗ WRONG"}</span>
                    </div>
                    {/* Time spent badge */}
                    {timing&&<div style={{background:"rgba(59,130,246,0.1)",border:"1px solid rgba(59,130,246,0.2)",borderRadius:8,padding:"6px 12px",marginBottom:10,display:"flex",justifyContent:"space-between",fontSize:11}}>
                      <span style={{color:"#60a5fa"}}>⏱ Time spent on this question</span>
                      <span style={{color:timing.timeSpent>60?"#ef4444":timing.timeSpent>30?"#f59e0b":"#10b981",fontWeight:700}}>{fmtSec(timing.timeSpent)}</span>
                    </div>}
                    <div style={{background:"rgba(255,255,255,0.04)",border:`1px solid ${isSkipped?"rgba(255,255,255,0.08)":isCorrect?"rgba(16,185,129,0.3)":"rgba(239,68,68,0.3)"}`,borderRadius:13,padding:14,marginBottom:10}}>
                      <div style={{display:"flex",gap:6,marginBottom:9}}>
                        <span style={{fontSize:9,background:SUBJ_COLOR[rq.subject]+"22",color:SUBJ_COLOR[rq.subject],padding:"2px 7px",borderRadius:10}}>{rq.subject}</span>
                        <span style={{fontSize:9,color:"#64748b",background:"rgba(255,255,255,0.06)",padding:"2px 7px",borderRadius:10}}>{rq.chapter}</span>
                      </div>
                      <p style={{fontSize:13,lineHeight:1.65,color:"#e2e8f0",marginBottom:12}}>{rq[lang].q}</p>
                      {rq[lang].options.map((opt,oi)=>{
                        const isAns=oi===rq.answer, isUser=oi===ans;
                        let bg="rgba(255,255,255,0.04)",border="rgba(255,255,255,0.08)",col="#94a3b8";
                        if(isAns){bg="rgba(16,185,129,0.15)";border="#10b981";col="#10b981";}
                        if(isUser&&!isAns){bg="rgba(239,68,68,0.15)";border="#ef4444";col="#ef4444";}
                        return <div key={oi} style={{background:bg,border:`1px solid ${border}`,borderRadius:8,padding:"9px 11px",marginBottom:5,fontSize:12,color:col,display:"flex",alignItems:"center",gap:8}}><span style={{width:18,height:18,borderRadius:"50%",background:isAns?"#10b981":isUser?"#ef4444":"rgba(255,255,255,0.08)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:"#fff",flexShrink:0}}>{["A","B","C","D"][oi]}</span>{opt}{isAns&&" ✓"}{isUser&&!isAns&&" ✗"}</div>;
                      })}
                    </div>
                    <div style={{background:"rgba(16,185,129,0.06)",border:"1px solid rgba(16,185,129,0.18)",borderRadius:11,padding:"10px 12px",marginBottom:12}}>
                      <div style={{fontSize:10,color:"#6ee7b7",marginBottom:4,fontWeight:600}}>💡 EXPLANATION</div>
                      <p style={{fontSize:12,color:"#94a3b8",lineHeight:1.6}}>{rq.explanation}</p>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7}}>
                      <button onClick={()=>setReviewIdx(i=>Math.max(0,i-1))} disabled={reviewIdx===0} style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:9,padding:"10px",color:reviewIdx===0?"#374151":"#e2e8f0",cursor:reviewIdx===0?"default":"pointer",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center",gap:5}}>
                        <Icon name="chevL" size={13}/>Prev
                      </button>
                      <button onClick={()=>setReviewIdx(i=>Math.min(testQs.length-1,i+1))} disabled={reviewIdx===testQs.length-1} style={{background:"rgba(16,185,129,0.13)",border:"1px solid rgba(16,185,129,0.3)",borderRadius:9,padding:"10px",color:reviewIdx===testQs.length-1?"#374151":"#10b981",cursor:reviewIdx===testQs.length-1?"default":"pointer",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center",gap:5}}>
                        Next<Icon name="chevR" size={13}/>
                      </button>
                    </div>
                  </div>
                );
              })()}
            </div>
          );
        })()}

        {/* ══════════ ANALYTICS ══════════ */}
        {screen==="analytics"&&(
          <div style={{padding:"16px 14px"}}>
            {selTest?(
              // ── Single test detail ──
              <div>
                <button onClick={()=>setSelTest(null)} style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:7,padding:"6px 11px",color:"#94a3b8",fontSize:11,cursor:"pointer",marginBottom:14}}>← All Results</button>
                <div style={{fontSize:17,fontWeight:700,color:"#fff",marginBottom:2}}>{selTest.name}</div>
                <div style={{fontSize:10,color:"#64748b",marginBottom:14}}>{selTest.date}</div>

                <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:13,padding:14,textAlign:"center",marginBottom:12}}>
                  <div style={{fontSize:9,color:"#6ee7b7",letterSpacing:2,marginBottom:3}}>SCORE</div>
                  <div style={{fontSize:40,fontWeight:700,color:"#fff"}}>{selTest.score}</div>
                  <div style={{fontSize:11,color:"#64748b"}}>out of {selTest.questions.length*4}</div>
                </div>

                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
                  {[{l:"Correct",v:selTest.correct,c:"#10b981"},{l:"Wrong",v:selTest.wrong,c:"#ef4444"},{l:"Skipped",v:selTest.skipped,c:"#f59e0b"}].map(s=>(
                    <div key={s.l} style={{background:s.c+"11",border:`1px solid ${s.c}33`,borderRadius:10,padding:"11px 5px",textAlign:"center"}}>
                      <div style={{fontSize:20,fontWeight:700,color:s.c}}>{s.v}</div>
                      <div style={{fontSize:9,color:"#64748b",marginTop:2}}>{s.l}</div>
                    </div>
                  ))}
                </div>

                {/* Per-question time chart */}
                <div style={{background:"rgba(59,130,246,0.07)",border:"1px solid rgba(59,130,246,0.2)",borderRadius:13,padding:12,marginBottom:12}}>
                  <div style={{fontSize:11,color:"#60a5fa",fontWeight:600,marginBottom:10}}>⏱️ Time Per Question</div>
                  <div style={{display:"flex",alignItems:"flex-end",gap:2,height:65}}>
                    {selTest.questions.map((q,i)=>{
                      const maxT=Math.max(...selTest.questions.map(x=>x.timeSpent),1);
                      const h=Math.max(3,(q.timeSpent/maxT)*100);
                      return <div key={i} title={`Q${i+1}: ${fmtSec(q.timeSpent)}`} style={{flex:1,height:`${h}%`,borderRadius:"2px 2px 0 0",background:q.isCorrect?"#10b981":q.isSkipped?"#374151":"#ef4444",opacity:0.8,minHeight:2}}/>;
                    })}
                  </div>
                  <div style={{display:"flex",gap:10,marginTop:6,fontSize:9,color:"#64748b"}}>
                    <span style={{color:"#10b981"}}>■ Correct</span><span style={{color:"#ef4444"}}>■ Wrong</span><span style={{color:"#475569"}}>■ Skipped</span>
                  </div>
                  {/* Slowest questions */}
                  <div style={{marginTop:10}}>
                    <div style={{fontSize:10,color:"#94a3b8",marginBottom:6}}>MOST TIME SPENT</div>
                    {[...selTest.questions].sort((a,b)=>b.timeSpent-a.timeSpent).slice(0,4).map((q,i)=>(
                      <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
                        <div>
                          <span style={{fontSize:11,color:"#cbd5e1"}}>{q.chapter}</span>
                          <span style={{fontSize:9,color:q.isCorrect?"#10b981":q.isSkipped?"#64748b":"#ef4444",marginLeft:6}}>{q.isCorrect?"✓":q.isSkipped?"–":"✗"}</span>
                        </div>
                        <span style={{fontSize:11,fontWeight:600,color:q.timeSpent>90?"#ef4444":q.timeSpent>45?"#f59e0b":"#94a3b8"}}>{fmtSec(q.timeSpent)}</span>
                      </div>
                    ))}
                  </div>
                </div>

                {/* Subject breakdown */}
                <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:13,padding:12}}>
                  <div style={{fontSize:11,color:"#64748b",fontWeight:600,marginBottom:10}}>SUBJECT BREAKDOWN</div>
                  {["Biology","Physics","Chemistry"].map(subj=>{
                    const qs=selTest.questions.filter(q=>q.subject===subj);
                    const c=qs.filter(q=>q.isCorrect).length;
                    const acc=qs.length?Math.round((c/qs.length)*100):0;
                    const avgT=qs.length?Math.round(qs.reduce((s,q)=>s+q.timeSpent,0)/qs.length):0;
                    return (
                      <div key={subj} style={{marginBottom:10}}>
                        <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                          <span style={{fontSize:12,color:SUBJ_COLOR[subj]}}>{subj}</span>
                          <div style={{display:"flex",gap:10,fontSize:11}}>
                            <span style={{color:SUBJ_COLOR[subj],fontWeight:600}}>{acc}%</span>
                            <span style={{color:"#64748b"}}>⏱ avg {fmtSec(avgT)}</span>
                          </div>
                        </div>
                        <div style={{height:5,background:"rgba(255,255,255,0.06)",borderRadius:3,overflow:"hidden"}}>
                          <div style={{height:"100%",width:`${acc}%`,background:SUBJ_COLOR[subj],borderRadius:3}}/>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            ):(
              // ── Overview ──
              <>
                <div style={{fontSize:20,fontWeight:700,color:"#fff",marginBottom:4}}>My Analysis</div>
                <div style={{fontSize:11,color:"#64748b",marginBottom:14}}>Deep performance insights across {history.length} tests</div>

                {history.length===0&&(
                  <div style={{textAlign:"center",padding:"40px 20px",color:"#475569"}}>
                    <div style={{fontSize:40,marginBottom:10}}>📊</div>
                    <div style={{fontSize:14}}>No tests yet. Give your first test to see analysis!</div>
                  </div>
                )}

                {history.length>0&&(
                  <>
                    {/* Show N selector */}
                    <div style={{display:"flex",gap:7,marginBottom:14,flexWrap:"wrap"}}>
                      {[5,10,20,history.length].map(n=>(
                        <button key={n} onClick={()=>setHistN(n)} style={{background:histN===n?"rgba(16,185,129,0.18)":"rgba(255,255,255,0.05)",border:`1px solid ${histN===n?"#10b981":"rgba(255,255,255,0.09)"}`,borderRadius:16,padding:"4px 12px",color:histN===n?"#10b981":"#94a3b8",cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>
                          {n===history.length?"All":` Last ${n}`}
                        </button>
                      ))}
                    </div>

                    {/* Score trend */}
                    {(()=>{
                      const data=history.slice(-histN);
                      const avg=Math.round(data.reduce((s,d)=>s+d.score,0)/data.length);
                      const best=Math.max(...data.map(d=>d.score));
                      const worst=Math.min(...data.map(d=>d.score));
                      return (
                        <>
                          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
                            {[{l:"Average",v:avg,c:"#3b82f6"},{l:"Best",v:best,c:"#10b981"},{l:"Lowest",v:worst,c:"#ef4444"}].map(s=>(
                              <div key={s.l} style={{background:s.c+"11",border:`1px solid ${s.c}22`,borderRadius:10,padding:"11px 7px",textAlign:"center"}}>
                                <div style={{fontSize:18,fontWeight:700,color:s.c}}>{s.v}</div>
                                <div style={{fontSize:9,color:"#64748b",marginTop:1}}>{s.l}</div>
                              </div>
                            ))}
                          </div>
                          <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:13,padding:12,marginBottom:12}}>
                            <div style={{fontSize:11,color:"#64748b",fontWeight:600,marginBottom:10}}>SCORE TREND</div>
                            <div style={{display:"flex",alignItems:"flex-end",gap:3,height:80}}>
                              {data.map((d,i)=>{
                                const min=Math.min(...data.map(x=>x.score))-20;
                                const max2=720; const pct=((d.score-min)/(max2-min))*100;
                                return (
                                  <button key={i} onClick={()=>setSelTest(d)} title={`${d.name}: ${d.score}`} style={{flex:1,height:`${Math.max(4,pct)}%`,background:i===data.length-1?"linear-gradient(180deg,#10b981,#059669)":"rgba(59,130,246,0.4)",borderRadius:"3px 3px 0 0",border:"none",cursor:"pointer",minHeight:3}}/>
                                );
                              })}
                            </div>
                            <div style={{fontSize:9,color:"#475569",marginTop:5,textAlign:"center"}}>Tap any bar to see details</div>
                          </div>
                        </>
                      );
                    })()}

                    {/* ── WEAK TOPICS ── */}
                    <div style={{background:"rgba(239,68,68,0.06)",border:"1px solid rgba(239,68,68,0.18)",borderRadius:13,padding:12,marginBottom:12}}>
                      <div style={{fontSize:12,color:"#f87171",fontWeight:600,marginBottom:10}}>🎯 Weak Topics (by accuracy across {histN} tests)</div>
                      {getWeakAnalysis(history.slice(-histN)).map(w=>(
                        <div key={w.chapter} style={{marginBottom:9}}>
                          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                            <div>
                              <span style={{fontSize:11,color:"#e2e8f0",fontWeight:600}}>{w.chapter}</span>
                              <span style={{fontSize:9,color:SUBJ_COLOR[w.subject],marginLeft:6}}>{w.subject}</span>
                            </div>
                            <div style={{display:"flex",gap:8,fontSize:10}}>
                              <span style={{color:w.accuracy<50?"#ef4444":w.accuracy<70?"#f59e0b":"#10b981",fontWeight:700}}>{w.accuracy}%</span>
                              <span style={{color:"#64748b"}}>{w.total}Q</span>
                            </div>
                          </div>
                          <div style={{height:5,background:"rgba(255,255,255,0.06)",borderRadius:3,overflow:"hidden"}}>
                            <div style={{height:"100%",width:`${w.accuracy}%`,background:w.accuracy<50?"#ef4444":w.accuracy<70?"#f59e0b":"#10b981",borderRadius:3}}/>
                          </div>
                        </div>
                      ))}
                      {weakTopics.filter(w=>w.accuracy<70).length>0&&(
                        <button onClick={generateAdaptiveTest} style={{width:"100%",background:"rgba(239,68,68,0.15)",border:"1px solid rgba(239,68,68,0.25)",borderRadius:9,padding:"10px",color:"#f87171",fontSize:12,cursor:"pointer",marginTop:4,fontWeight:600,fontFamily:"inherit"}}>
                          🎯 Practice These Topics Now
                        </button>
                      )}
                    </div>

                    {/* ── TIME ANALYSIS ── */}
                    <div style={{background:"rgba(59,130,246,0.06)",border:"1px solid rgba(59,130,246,0.18)",borderRadius:13,padding:12,marginBottom:12}}>
                      <div style={{fontSize:12,color:"#60a5fa",fontWeight:600,marginBottom:10}}>⏱️ Topics Where You Take Most Time</div>
                      {getTimeAnalysis(history.slice(-histN)).slice(0,5).map((t,i)=>(
                        <div key={t.chapter} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
                          <div>
                            <div style={{fontSize:11,color:"#cbd5e1"}}>{t.chapter}</div>
                            <div style={{fontSize:9,color:SUBJ_COLOR[t.subject]}}>{t.subject}</div>
                          </div>
                          <div style={{textAlign:"right"}}>
                            <div style={{fontSize:12,fontWeight:700,color:t.avgTime>60?"#ef4444":t.avgTime>30?"#f59e0b":"#10b981"}}>{fmtSec(t.avgTime)}</div>
                            <div style={{fontSize:9,color:"#64748b"}}>avg / question</div>
                          </div>
                        </div>
                      ))}
                      <div style={{fontSize:10,color:"#475569",marginTop:8}}>💡 Tip: Questions taking over 60s may need more revision</div>
                    </div>

                    {/* Test list */}
                    <div style={{fontSize:11,color:"#64748b",letterSpacing:1,marginBottom:9}}>ALL TESTS — TAP FOR DETAIL</div>
                    {recentTests.map(t=>(
                      <button key={t.id} onClick={()=>setSelTest(t)} style={{width:"100%",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:11,padding:"12px 13px",color:"#fff",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7,textAlign:"left"}}>
                        <div>
                          <div style={{fontSize:12,fontWeight:600}}>{t.name}</div>
                          <div style={{fontSize:9,color:"#64748b",marginTop:2}}>{t.date} · ✓{t.correct} ✗{t.wrong} –{t.skipped}</div>
                        </div>
                        <div style={{textAlign:"right"}}>
                          <div style={{fontSize:17,fontWeight:700,color:t.score>=360?"#10b981":t.score>=180?"#f59e0b":"#ef4444"}}>{t.score}</div>
                          <div style={{fontSize:8,color:"#64748b"}}>/{t.questions.length*4}</div>
                        </div>
                      </button>
                    ))}
                  </>
                )}
              </>
            )}
          </div>
        )}

        {/* ══════════ AI TUTOR ══════════ */}
        {screen==="ai"&&(
          <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 130px)"}}>
            <div style={{padding:"14px 14px 7px"}}>
              <div style={{fontSize:19,fontWeight:700,color:"#fff"}}>AI Doubt Solver</div>
              <div style={{fontSize:10,color:"#64748b",marginTop:1}}>Ask anything — Physics, Chemistry, Biology</div>
            </div>
            {doubts.length===0&&(
              <div style={{padding:"0 14px 10px",display:"flex",flexDirection:"column",gap:6}}>
                {["Explain the process of meiosis","What is Fleming's right hand rule?","Difference between ionic and covalent bonds"].map(s=>(
                  <button key={s} onClick={()=>setDoubt(s)} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:8,padding:"8px 11px",color:"#94a3b8",cursor:"pointer",fontSize:11,textAlign:"left"}}>"{s}"</button>
                ))}
              </div>
            )}
            <div style={{flex:1,overflowY:"auto",padding:"0 14px"}}>
              {doubts.map((m,i)=>(
                <div key={i} style={{marginBottom:9,display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
                  {m.role==="ai"&&<div style={{width:24,height:24,borderRadius:"50%",background:"linear-gradient(135deg,#10b981,#3b82f6)",display:"flex",alignItems:"center",justifyContent:"center",marginRight:6,flexShrink:0,fontSize:12}}>🤖</div>}
                  <div style={{maxWidth:"80%",background:m.role==="user"?"rgba(16,185,129,0.18)":"rgba(255,255,255,0.05)",border:`1px solid ${m.role==="user"?"rgba(16,185,129,0.35)":"rgba(255,255,255,0.09)"}`,borderRadius:m.role==="user"?"12px 12px 3px 12px":"12px 12px 12px 3px",padding:"8px 11px",fontSize:12,lineHeight:1.6,color:"#e2e8f0"}}>
                    {m.text}
                  </div>
                </div>
              ))}
              {aiLoad&&<div style={{display:"flex",alignItems:"center",gap:7,marginBottom:9}}>
                <div style={{width:24,height:24,borderRadius:"50%",background:"linear-gradient(135deg,#10b981,#3b82f6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12}}>🤖</div>
                <div style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.09)",borderRadius:"12px 12px 12px 3px",padding:"8px 12px",display:"flex",gap:4}}>
                  {[0,1,2].map(i=><div key={i} style={{width:5,height:5,borderRadius:"50%",background:"#10b981",animation:`bounce 1s ${i*0.2}s infinite`}}/>)}
                </div>
              </div>}
              <div ref={chatEnd}/>
            </div>
            <div style={{padding:"8px 14px 2px",borderTop:"1px solid rgba(255,255,255,0.06)"}}>
              <div style={{display:"flex",gap:7,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.09)",borderRadius:11,padding:"6px 9px"}}>
                <input value={doubt} onChange={e=>setDoubt(e.target.value)} onKeyDown={e=>e.key==="Enter"&&askDoubt()} placeholder="Type your NEET doubt..." style={{flex:1,background:"none",border:"none",color:"#e8eaf0",fontSize:12,outline:"none",fontFamily:"inherit"}}/>
                <button onClick={askDoubt} disabled={aiLoad||!doubt.trim()} style={{background:doubt.trim()?"linear-gradient(135deg,#10b981,#3b82f6)":"rgba(255,255,255,0.05)",border:"none",borderRadius:7,width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",cursor:doubt.trim()?"pointer":"default",color:"#fff",flexShrink:0}}>
                  <Icon name="send" size={13}/>
                </button>
              </div>
            </div>
          </div>
        )}

        {/* ══════════ ADMIN ══════════ */}
        {screen==="admin"&&(
          <div style={{padding:"16px 14px"}}>
            <div style={{fontSize:19,fontWeight:700,color:"#fff",marginBottom:2}}>Admin Panel</div>
            <div style={{fontSize:10,color:"#64748b",marginBottom:14}}>Private — upload & generate NEET tests</div>
            <div style={{display:"flex",gap:7,marginBottom:16,background:"rgba(255,255,255,0.04)",borderRadius:9,padding:3}}>
              {[{id:"upload",label:"📤 Upload"},{id:"generate",label:"⚡ AI Generate"}].map(t=>(
                <button key={t.id} onClick={()=>setAdminTab(t.id)} style={{flex:1,background:adminTab===t.id?"rgba(16,185,129,0.18)":"none",border:`1px solid ${adminTab===t.id?"#10b981":"transparent"}`,borderRadius:7,padding:"8px 5px",color:adminTab===t.id?"#10b981":"#64748b",cursor:"pointer",fontSize:11,fontFamily:"inherit",fontWeight:adminTab===t.id?700:400}}>
                  {t.label}
                </button>
              ))}
            </div>

            {adminTab==="upload"&&(
              <div>
                <div style={{background:"rgba(255,193,7,0.07)",border:"1px solid rgba(255,193,7,0.18)",borderRadius:11,padding:"11px 13px",marginBottom:14}}>
                  <div style={{fontSize:11,color:"#fbbf24",fontWeight:600,marginBottom:3}}>🔒 Private Zone</div>
                  <div style={{fontSize:10,color:"#92400e",lineHeight:1.6}}>Paste NCERT / coaching questions. AI converts them + translates to Hindi. Students only see final tests.</div>
                </div>
                <textarea value={pastedQ} onChange={e=>setPastedQ(e.target.value)} placeholder={"1. Which organelle produces ATP?\na) Nucleus  b) Mitochondria\nc) Ribosome  d) Golgi\nAnswer: b\n\n2. Newton's 2nd law F=?\na) mv  b) ma  c) ms  d) mt\nAnswer: b"} style={{width:"100%",minHeight:180,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.09)",borderRadius:11,padding:"11px 12px",color:"#e2e8f0",fontSize:11,outline:"none",fontFamily:"monospace",resize:"vertical",lineHeight:1.6,boxSizing:"border-box"}}/>
                <button onClick={convertQuestions} disabled={genLoad||!pastedQ.trim()} style={{width:"100%",background:pastedQ.trim()?"linear-gradient(135deg,#10b981,#059669)":"rgba(255,255,255,0.05)",border:"none",borderRadius:11,padding:"12px",color:"#fff",fontSize:13,cursor:pastedQ.trim()?"pointer":"default",fontWeight:600,marginTop:9,display:"flex",alignItems:"center",justifyContent:"center",gap:7}}>
                  {genLoad?<><div style={{width:13,height:13,border:"2px solid rgba(255,255,255,0.3)",borderTopColor:"#fff",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>Processing...</>:<><Icon name="zap" size={14}/>Convert to Test</>}
                </button>
                {genTest&&(
                  <div style={{marginTop:14}}>
                    <div style={{fontSize:11,color:"#10b981",fontWeight:600,marginBottom:9}}>✅ {genTest.length} Questions Ready</div>
                    {genTest.map((q,i)=>(
                      <div key={i} style={{background:"rgba(16,185,129,0.06)",border:"1px solid rgba(16,185,129,0.14)",borderRadius:10,padding:"11px 12px",marginBottom:7}}>
                        <div style={{display:"flex",gap:6,marginBottom:5}}>
                          <span style={{fontSize:9,color:SUBJ_COLOR[q.subject]||"#94a3b8",background:(SUBJ_COLOR[q.subject]||"#94a3b8")+"22",padding:"2px 6px",borderRadius:8}}>{q.subject}</span>
                          <span style={{fontSize:9,color:"#64748b",background:"rgba(255,255,255,0.05)",padding:"2px 6px",borderRadius:8}}>{q.difficulty}</span>
                        </div>
                        <div style={{fontSize:11,color:"#cbd5e1",marginBottom:5}}>{q.en?.q}</div>
                        {q.en?.options?.map((o,oi)=><div key={oi} style={{fontSize:10,color:oi===q.answer?"#10b981":"#64748b",padding:"1px 0"}}>{["A","B","C","D"][oi]}. {o}{oi===q.answer?" ✓":""}</div>)}
                      </div>
                    ))}
                    <button onClick={()=>startTest(genTest,genTest.length*2,"Custom Test")} style={{width:"100%",background:"linear-gradient(135deg,#3b82f6,#1d4ed8)",border:"none",borderRadius:10,padding:"11px",color:"#fff",fontSize:12,cursor:"pointer",fontWeight:600,marginTop:4}}>
                      🚀 Launch This Test
                    </button>
                  </div>
                )}
              </div>
            )}

            {adminTab==="generate"&&(
              <div>
                <div style={{background:"rgba(139,92,246,0.08)",border:"1px solid rgba(139,92,246,0.18)",borderRadius:11,padding:"12px 13px",marginBottom:14}}>
                  <div style={{fontSize:12,color:"#a78bfa",fontWeight:600,marginBottom:4}}>⚡ Quick AI Generator</div>
                  <div style={{fontSize:10,color:"#7c3aed",lineHeight:1.6}}>Select a topic → AI generates test → you review → launch to students.</div>
                </div>
                {[
                  {topic:"Cell Biology & Genetics",sub:"Biology",n:10},{topic:"Laws of Motion & Thermodynamics",sub:"Physics",n:10},
                  {topic:"Chemical Bonding & Organic Chemistry",sub:"Chemistry",n:10},{topic:"Full Mixed NEET",sub:"All",n:20},
                ].map(t=>(
                  <button key={t.topic} onClick={()=>{setPastedQ(`Generate ${t.n} NEET MCQs on ${t.topic} (${t.sub}). Strictly NCERT based. Include answer and explanation.`);setAdminTab("upload");}} style={{width:"100%",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(139,92,246,0.18)",borderRadius:10,padding:"12px 13px",color:"#fff",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7,textAlign:"left"}}>
                    <div><div style={{fontSize:12,fontWeight:600}}>{t.topic}</div><div style={{fontSize:9,color:"#64748b",marginTop:1}}>{t.sub} · {t.n} Qs</div></div>
                    <div style={{background:"rgba(139,92,246,0.18)",color:"#a78bfa",borderRadius:6,padding:"4px 9px",fontSize:9,fontWeight:600}}>Select</div>
                  </button>
                ))}
              </div>
            )}
          </div>
        )}

      </main>

      <style>{`
        @keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
        @keyframes spin{to{transform:rotate(360deg)}}
        *{box-sizing:border-box;margin:0;padding:0}
        ::-webkit-scrollbar{width:3px}
        ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}
        input::placeholder,textarea::placeholder{color:#475569}
      `}</style>
    </div>
  );
}

document.getElementById('loading').style.display = 'none';
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<MedTest />);
</script>
</body>
</html>
